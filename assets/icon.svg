<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle center divider -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- ✂ SCISSORS (left half) -->
  <!-- Blades emerge from ring edges (not ring centers) -->
  <line x1="19" y1="54" x2="40" y2="18"
        stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="54" x2="9" y2="18"
        stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Left handle ring (back, dimmed) -->
  <circle cx="14" cy="62" r="7" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.8"/>
  <!-- Right handle ring (front, white) -->
  <circle cx="34" cy="62" r="7" fill="none" stroke="white" stroke-width="2.8"/>
  <!-- Finger rest / czupczik -->
  <line x1="35" y1="69" x2="37" y2="77"
        stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Pivot screw -->
  <circle cx="25" cy="45" r="3" fill="white"/>
  <circle cx="25" cy="45" r="1.3" fill="#764ba2"/>

  <!-- 💈 HAIR CLIPPER (right half, blade at TOP) -->
  <!-- Teeth pointing upward -->
  <rect x="63" y="13" width="3" height="7" rx="1" fill="white"/>
  <rect x="67" y="13" width="3" height="7" rx="1" fill="white"/>
  <rect x="71" y="13" width="3" height="7" rx="1" fill="white"/>
  <rect x="75" y="13" width="3" height="7" rx="1" fill="white"/>
  <rect x="79" y="13" width="3" height="7" rx="1" fill="white"/>
  <rect x="83" y="13" width="3" height="7" rx="1" fill="white"/>
  <!-- Blade bar -->
  <rect x="61" y="19" width="28" height="5.5" rx="2" fill="white"/>
  <!-- Body: wider at top, tapers to rounded dome at bottom -->
  <path d="M 64 24 L 86 24 L 84 67 Q 84 76 75 76 Q 66 76 66 67 Z"
        fill="none" stroke="white" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Body / dome separation line -->
  <line x1="66.5" y1="67" x2="83.5" y2="67"
        stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Top indicator light (just inside top of body) -->
  <rect x="70" y="29" width="10" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Side switch/slider -->
  <rect x="80" y="43" width="3.5" height="14" rx="1.75" fill="rgba(255,255,255,0.55)"/>
  <!-- Grip lines -->
  <line x1="66" y1="50" x2="79" y2="50"
        stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="66" y1="55" x2="79" y2="55"
        stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
